body:
  text: 卷之三五運化生並歌括甲己化土乙庚化金丙辛化水丁壬化木戊癸化火歌曰甲已化土乙庚金丁壬化木盡成林丙辛化水滔滔去戊癸南方火炎侵六氣交節生氣並歌括初之氣自舊歲大寒至今歲春分屬厥陰風木謂之生氣二之氣自春分至小滿屬少陰君火謂之舒氣三之氣自小滿至大暑屬少陽相火謂之長氣四之氣自大暑至秋分屬太陰濕土謂之化氣五之氣自秋分至小雪屬陽明燥金謂之收氣六之氣自小雪至大寒屬太陽寒水謂之嚴氣以上每候六十日所運寒水迭驗生成之機明水旱之徵識災祥之變也歌曰大寒厥陰氣之初春分君火二之居小滿少陽三之氣大暑太陰四氣呼秋分陽明五之氣太陽小雪六之餘標本運氣歌少陽從本為相火太陰從本濕土坐厥陰從中火是家陽明從中濕是我太陽少陽標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可萬病能將火濕分撤開軒岐無縫鎖十二經絡水火分治法膽與三焦尋火治肝和包絡都無異脾胃長將濕處求肺與大腸同濕治腎與膀胱心小腸寒熱臨時旋商議裡寒表熱小腸溫裡熱表寒心腎熾十二經最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息裡熱表寒宜越竭表熱裡寒宜汗釋濕同寒火同熱寒熱到頭無兩説六分分來半分寒寒熱中停真浪舌休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少治濕無過似決川此個筌蹄最分曉濕熱上甚以汗為苦濕甘辛發宜早感謝軒岐萬世恩爭奈醯雞笑天小麻徵均學醫指南詩不讀本草焉知藥性專泥藥性決不識病假饒識病未必得法識病得法工中之甲能窮素問病受何氣便知用藥當擇何味又曰不誦十二經絡開口動手便錯不通五運六氣檢遍方書何濟經絡明認得標運氣明認得本求得標只取本治千人無一損五郁之發土鬱之發岩谷震驚雷殷氣交埃昏黃黑化為白氣飄驟高深擊石飛空洪水乃從川流漫衍田牧土駒化氣乃敷善為時雨始生始長始化始成故民病心腹脹腸鳴而為數後甚則心痛脅䐜嘔吐霍亂飲發汪下胕腫身重云奔雨府霞擁朝陽山澤埃昏其乃發也以其四氣謂夏至後三十二日起至秋分日也云橫天山浮遊生滅怫之先兆也金鬱之發天潔地明風清氣切大涼乃舉草樹浮煙燥氣以行霿霧數起殺氣來至草木蒼干金乃有聲故民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面陳色惡山澤焦枯土凝霜滷怫乃發也其氣五謂秋分後至立冬後五十四日內也夜零白露林莽聲淒怫之兆也水鬱之發陽氣乃闢陰氣暴舉大寒乃至川澤嚴凝寒霧結為霜雪甚則黃黑昏翳流行氣交乃為霜殺水乃見祥故民病寒客心痛腰椎痛大關節不利屈伸不便善厥逆痞堅腹滿陽光不治空積沉陰白埃昏瞑而乃發也其氣二火前後謂君相二火前後太虛深玄氣猶麻散微見而隱色黑微黃怫之先兆也木鬱之發太虛埃昏雲物以擾大風乃至屋發折木木有變故民病胃脘為心而痛上肢兩脅膈咽不通食飲不下甚則耳鳴眩轉目不識人善暴僵仆太虛蒼埃天山一色或為濁色黃黑郁若橫云不起雨而乃發也其氣無常長川草偃柔葉呈陰松吟高山虎笑岩岫怫之先兆也火鬱之發太虛腫翳大明不彰炎火行大暑至山澤燔燎林木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃風行惑言濕化乃後故此病少氣瘡瘍癰腫脅腹胸背面首四肢䐜憤臚脹瘍痱嘔逆瘛瘲骨痛節乃有動注下溫瘡腹中暴痛血溢流注精液乃少目赤心熱甚則瞀悶懊憹善暴死刻中大溫汗濡玄府其乃發也其氣四動復則靜陽極反陰濕令乃化華髮水凝山川冰雪焰陽午澤怫之先兆也又曰水發而雹雪土發而飄驟木發而毀折金髮而清明火發而熏昧十二變報德以德報化以化報政以政執令以令氣高則高氣下則下氣後則後氣前則前氣中則中氣外則外佐之常也故風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫隨氣所在以言其變耳五郁捷法木鬱達之所謂吐者令其調達也木鬱之發飛屋折木火鬱發之所謂發散令其疏散也火鬱之發山澤焚燎林木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃金鬱泄之所謂令其滲泄解表利小便也金鬱之發天潔地明草木蒼干土鬱奪之所謂下泄令其無壅礙也土鬱之發岩谷震驚擊石飛空洪水乃泛川流蔓衍田牧土駒水鬱折之所謂抑其沖逆也鴻也水鬱之發大寒乃至川澤嚴凝以上通其五法乃氣同調復視其虛實而調之乃治病之大體也非明造化者不論至此其弗之應必有先兆誠以氣之勝復而致然也其以氣之所司與夫勝復所致其應驗如此十干配臟腑歌甲膽乙肝丙小腸丁心戊胃己脾鄉庚配大腸辛配肺壬屬膀胱癸腎當五臟配六腑歌心合小腸肝合膽脾連於胃腎膀胱命門卻向三焦配肺臟還歸對大腸手足三陰三陽配五臟六腑歌太陽小腸手之經陽明所屬大腸尋少陽三焦太陰主厥陰包絡少陰心太陽膀胱足之端陽明所屬胃相干太陽脾土少陽膽少陰腎水厥陰肝五運主病熱類以少陰君火之熱乃真心小腸之氣也諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大癰疽瘍疹瘤氣結核上下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閉身熱惡寒戰栗驚惑悲笑讝妄皆屬於熱肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸胃熱則口淡心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾濕類足太陰濕土乃脾胃之氣也濕極則生熱諸痙強直積飲痞隔中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕火類少陽相火之熱乃心包絡三焦之氣也諸熱瞀瘛冒瘖冒昧躁擾狂越罵詈驚駭跗腫疼痠氣逆衝上禁栗如喪神守喋嘔瘡瘍喉痹耳鳴及聾湧溢食不下目昧不明暴注暴病暴死皆屬於火燥類陽明燥金乃肺與大腸之氣也諸澀枯涸幹徑皴揭皆屬於燥寒類足太陽寒水乃腎與膀胱之氣也諸病上下所出水液澄清冷癥瘕㿗疝堅痞腹滿急痛下痢清白食不飢吐痢腥穢屈伸不便厥逆禁固皆屬於寒風製法風淫於內治以辛涼佐以苦以甘緩之以辛散之防風通聖散天麻散小續命湯防風湯消風湯祛風丸排風湯獨治於內承氣湯陷胸湯神芎丸大黃丸備急丹暑製法熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之白虎湯桂苓湯玉壺丸碧玉散玉露散石膏湯獨治於外拔毒散水澄膏生肌散魚膽丸濕製法濕淫於內治以苦熱佐以鹹淡以苦燥之以淡泄之白朮木香散五苓散葶藶木香散橘皮白朮散益元散神助散桂苓白朮散兼治於內防風通聖散大柴胡湯小柴胡湯柴胡飲子當歸飲子火治法火淫於內治以鹹寒佐以甘辛以酸收之以苦發之涼膈散解毒丸神功丸八正散調胃散大小承氣湯兼治於外桂枝湯麻黃湯小建中湯升麻湯五積散燥製法燥淫於內治以苦溫佐以甘辛以辛潤之以苦下之神功丸麻仁丸脾約丸潤體丸潤腸丸四生丸葶藶散先治內後治外謂寒藥先攻裡大黃芒硝黑牽牛之類謂熱藥後攻表桂枝麻黃升麻之類寒製法寒淫於內治以甘熱佐以苦辛以辛散之以苦堅之薑附湯四逆湯二薑湯朮附湯大已寒丸附子理中丸先治外後治內攻表用熱藥攻裡用寒藥論濕變五泄總歸於濕風濕則胃泄夫胃泄者飲食不化完穀出色黃風乘胃也宜化劑之類暑濕則脾泄夫脾泄者腹脹滿注實則生嘔逆之證宜和劑淡劑甘劑清劑之類燥濕則大腸泄夫大腸泄者腸鳴切痛先宜寒劑奪之次以甘劑分其陰陽也濕熱則小腸泄夫小腸泄者溲而便膿血也少腹痛宜寒劑奪之次以酸劑收之淡劑甘劑分之寒熱則大瘕泄夫裡急後重者數至圊窘而不能便先宜清劑寒劑奪之後以淡劑甘劑分之或莖中痛五臟六腑主病肝之經足厥陰風乙木是動則病腰痛不可俯仰丈夫㿉疝婦人小腹腫甚則咽乾面塵色脫胸滿嘔逆洞泄狐疝遺溺癃病膽之經足少陽風甲木是動則病口苦善太息心脅痛不能轉側甚則面微塵體無膏澤足外反熱是謂陽厥或頭痛目鋭眥痛缺盆中腫痛腋下痛馬刀瘰癧癭汗出振寒瘧心之經手少陰暑丁火是動則病咽乾心痛渴而欲飲是謂臂厥主心所生病者目黃脅痛臑臂內外兼痛兼掌中熱小腸經手太陽暑丙火是動則病咽痛頜腫不可回顧肩似拔臑似折主液所生病者耳聾目黃頰頜腫肩臑肘臂外兼痛脾之經足太陰濕己土是動則病舌本強食則嘔吐胃脘痛腹脹善噫身體皆瞤動主脾所生病者體不能動搖食不下心煩心下急痛寒瘧溏瘕泄水下黃疸不能臥股膝內腫厥大指不動用皆濕鬱所生胃之經足陽明濕戊土是動則病悽慘振寒善伸數欠顏色黑病則惡人與火聞木音則惕然而驚心動欲閉門獨處甚則欲登高而歌棄衣而走奔豚腹脹是謂髀厥心包經手厥陰為母血是動則病手心熱跗臂攣急腋腫甚則胸脅支滿心中淡冷大動面赤目黃善笑不休主心包脈所生病者煩心心痛掌中熱三焦經手少陽為父氣是動則病耳聾耳鳴咽腫喉痹主氣所生病者汗出目鋭眥痛耳後肩臑肘臂外兼皆痛小指次指不用大腸經手陽明燥庚金是動則病齒痛頰腫主津所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用肺之經手太陰燥辛金是動則病肺脹膨膨而喘咳缺盆中痛甚則交兩手而瞀是謂臂厥主肺所生病咳嗽上氣喘噎煩心氣胸滿臑臂前後兼痛掌中熱氣感實腎皆痛風汗出中風小便數而欠氣虛則肩背痛惡寒少氣不足以息尿出血腎之經足少陰寒癸水是動則病飢不欲食面黑如漆唾則有血喉鳴而喘坐而欲起目䀮䀮無所見心如懸若飢氣不足則喜恐是謂骨厥主腎所生病者口熱舌乾咽腫上氣咽乾及痛煩心心痛黃疸腸澼臀肉骨後臁痛嗜臥足下熱而痛也膀胱之經足太陽寒壬水是動則病頭痛似脫項似拔脊痛腰似折髀不可以曲膕而結臑如裂是謂踝厥主筋所生病者痔瘧狂顛目黃淚出鼽衄項背腰尻膕臑腳皆痛小指不用十二經氣血多少歌十二經中氣血藏孰多孰少要均詳多氣少血心與肺脾腎三焦膽共粧氣血俱多胃大腸肝包少氣多血光更有二經專要記小腸直數到膀胱五運太過不及平氣歌併為病法金運原來屬乙庚太商太過是堅成燥氣流行少商從革順為記痰氣流行平氣原來載審平太過寸為氣口此為氣壅傷食胸滿不利中滿短氣痰壅喘急咳嗽喘滿鬱塞不通涕唾稠黏鼻塞若見形證瘦弱狀似勞疾肺脈大旺火克於金痰涕膿血大腸不利睡則一邊骨熱鼻中出瘀血不及此為陽部中見陰亦名氣損氣者本也本者足也里也既氣口部中見不及脈焉為氣實脈訣云一朝肺絶脈沉沉染病臥床思此語金不及吐咯血短氣咳嗽有冷痰有寒有熱鼻流清涕丁壬木運要均平太角太過是發生風氣流行木氣太過金不能勝之故木氣流行少角不及委和紀燥氣乃行蓋氣移為金所乘故燥氣金之氣行余仿此平氣敷和不可更太過初夏為順名子乘母又名前來者為實邪肝經風壅主頭疼痛心煩多怒好睡神昏兼有寒邪眼赤流熱淚不及一名陰乘之脈二名母憶其子虛邪之脈又名肺傳肝金克於木又曰肝元氣虛筋血不能榮養忽怒氣逆上而不下臨食喜怒傷動肝氣次傳心目下主筋脈衰弱肝虛膽冷夜間少睡頭目昏眩睛暗不能久視腰腿疼痛百節碎痛胸滿氣短壅痰咯血狀如紅綿陽事不興眼澀眼花四肢虛弱也丙辛水運應須記太羽太過屬流行寒氣流行少羽不及涸流紀濕氣乃行平氣靜順不用評太過一名陽乘之脈又名實邪之脈又名風邪入腎經主脾腎風勞攻疰腰膝疼下疰生瘡耳鳴目昏陰囊濕癢頭目眩重背髀痛兼有寒邪邪風入於肺經頭目昏眩腎經邪熱也不及一名陰盛之脈二名脫精之脈三名陽衰四名七傷所管主見偃刀澀脈主夢遺陽事衰弱小腹痛小便多目昏耳鳴腰重背髀痛五心熱口乾津液枯少痰嗽怯寒足冷腰膝疼痛戊癸火運屬南方赫義太徵最難當炎暑流行伏明少徵為不及寒氣乃行平氣升平要審詳太過主傷寒發熱面赤頭疼煩躁心熱口舌生瘡手心熱頭昏小便赤口苦唇焦上壅口氣頭項拘急為太過之病如南方或咽喉腫痛大小便不勻不及一名熒短二名陽衰三名陰乘之脈四名賊邪之脈五名從後來者為虛邪六名精竭陰痿盜汗心氣不足事緒多忘心多怔忡心疼膈滿脅腹膨脹怕驚噎寒睡臥不穩內熱怯寒陽事劣弱小便不快甲己土運屬中央太宮太過崇阜粧雨濕流行少宮不及卑監紀風氣乃行平氣備化心中藏太過心氣傳脾火生於土主胃熱內熱脾經邪熱憎寒口氣生瘡多渴好睡更加緊脈須下惡血積痢肚疼胸膈不快如緊腹疼積熱臟腑不勻胃經有熱痰嘔逆吃食無味神昏唇焦吞酸食不消也不及主胃氣虛弱四肢倦怠兼胃積熱瀉痢頻併憎寒酸心冷痃翻吃胃食不下嘔逆腹痛腸鳴胸膈不通而鬱悶也已上五運平氣假如甲己化土而遇辰戌丑未之歲乙庚化金而遇申酉歲之類是也太乙天符如乙酉歲乙庚化金而遇酉又上見燥金司天是也天符者如丙戌歲丙辛化水上見寒水司天是也同天符者如庚子庚午歲下臨燥金在泉同歲會者如辛丑辛未歲下臨寒水在泉是也歲會天符歲會則為平氣命門太過其火為順此為安吉之兆也六脈和靜其無相剋命門不及主陰痿陽事衰弱腰腎疼小腹急臍下痛氣短耳重如洪大脈為三焦盛上壅涕唾稠黏小便赤濁多渴咽喉腫痛也手足三陰三陽藥補瀉歌太陽膀胱少陰腎苦補咸瀉要均認氣寒補虧熱瀉之此是先師一言定陽明大腸太陰肺酸補辛瀉皆須記氣寒補虧濕瀉之用藥之時宜仔細足陽明胃太陰脾甘補辛瀉誰能知寒熱溫涼宜補瀉便須用藥從其宜太陽小腸少陰心咸補甘瀉順當尋氣熱補虧寒用瀉二般調治值千金少陽膽虧厥陰肝補用辛虧瀉用鹹氣宜溫補別無法請均仔細莫易看此是先賢訓經此後來學者潛心觀十二經瀉火用藥歌十二經中皆有火問均何藥瀉何經黃連瀉心並肝膽更有柴胡肝膽並黃柏膀胱知母腎三焦大腸肺用芩芍藥蠲脾石膏胃木通能泄小腸清三焦五治柴胡的手足陰陽仔細評十二經通經用藥歌小腸膀胱屬太陽藁本羌活是本鄉三焦膽與肝包絡少陽厥陰柴胡強陽明大腸兼足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺經異升麻芍藥白芷祥少陰心經獨活主腎經獨活加桂良通經用此藥為使更有何病到膏肓諸經疼痛用藥歌人患風濕對醫陳便將羌活治其因川芎醫腦藁巔頂芍藥同消腹內疼臍下青皮黃柏好腰間杜仲是其真茱萸治心胃草豆脅用柴胡更絶倫甘草梢蠲莖里痛枳殼應消氣刺身血刺疼兮何可療惟有當歸一味能諸經氣血用藥歌消痞原來枳朮宜痞寒用去白陳皮腹中窄狹施蒼朮補氣人參可用之破死血兮桃仁好活血當歸用最奇更有川芎生補血玄胡調血甚堪施木香調氣為頭藥破滯青皮枳殼宜六氣用藥補瀉歌太陽寒水宜甘熱陽明燥金用苦溫少陰少陽鹹寒用太陰濕土苦熱親厥陰風木辛涼治六氣之中用較真不生暴過並苛疾折郁滋源心要陳上中下三部見血用藥歌三部見血如何治上用防風中用連下部地榆施活法更加血藥同其煎三焦濕熱用藥歌三焦濕熱腫堪憐上用黃芩中用連下用草龍防己柏要君記用莫遷延傷寒三百九十七法歌括計一十七條傷寒三百九十七仲景相傳有消息痓五濕六暍有三一十四法俱無方上陽二十有七法一十六證原有藥起自桂枝四逆連余宜臨病自斡旋中太陽兮九十七六十六證原有術葛根起接抵當湯三十一證原無方下太陽兮五十七三十九法有藥術陷胸丸與炙草湯一十七證自推測陽明六十四證誇四十四法治無差調胃承氣為頭藥麻黃連翹赤豆加更有無藥二十法臨病診時宜細察少陽之法止有五一方小柴宜審委四證無藥要從權此是半表半在裡太陽一證有六法一半有藥半無方起自理中之丸藥後來還有白頭湯少陰更有三十二有藥治療該草三無藥止有八個法請均用時宜細添厥陰之法三十二一十九法有藥治一十三法更無傳請均仔細專心記霍亂止有八法該六法有藥不順猜二法無方探顧求理中竹葉良可謀不可汗該一十三無藥無方最艱難惟有可汗該二法半有半無宜斟酌汗後有藥該一法勞復六法俱有藥可吐三法無藥方請均一一宜消詳不可下證有草三治法止有一個藥二十二法何處求請均用意自詳察可下九法俱有方詳證之時用散湯若是為醫能記此姓名四海盡傳揚傷寒八十一味藥一百十二有名方除了五丸並八散九十九個是煎湯傷寒得汗法寅申巳亥一四七子午卯酉二五八辰戌丑未三六九此是病人得汗法絶日受病庚寅辛卯難逃命甲乙申酉是死鄉丙丁戌亥應難治壬癸還順已午亡更有戊己時四季來到戌上自為傷四絶日得病春亥夏申秋巳冬寅此為四絶難為病人傷寒六經補瀉用藥太陽證表未解下之太早成結胸陽明證用熱藥太過即發黃於遍身生血斑血衄少陽證下之早即兩脅痛吐逆不止少陰證無汗即動血吐血者死下之早亡血太陰證當溫其里如下之太早心胸滿悶下痢不止厥陰證下之早即四肢逆冷若因生寒十死一生不宜冷藥有六陳陳皮還須要隔年麻黃百載更堪憐大黃數載橫紋者不過三年力未全醫家不使新荊芥木賊從來不用鮮此是六陳均記取會者人間作地仙又歌曰茱萸半夏不宜新枳殼陳皮最要陳麻黃狼毒年深好此藥名為真六陳藥有十八反硫黃本是火之精焰硝一見冷如冰水銀不得逢砒藥狼毒莫逢密陀僧巴豆雄黃最為上憂見牽牛不順情川草二烏休用犀人參莫使近靈芝官桂善能調理氣若逢石脂便相欺大凡修合看逆順炮炙分明要細知又歌曰大戟芫花並海藻甘遂四味忌甘草黎蘆不與五參同芍藥細辛並不好狼毒貝母及瓜蔞半夏最怕烏頭惱又歌曰甘草連心赤蟾酥怕赤睛鹿茸怕銅鐵鱉甲去邊裙枳殼除穰隔桃杏怕雙仁蛇不連頭用乾蠍白如銀
