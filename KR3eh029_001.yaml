body:
  text: 卷之一論人之育孕胚胎且如一晝夜人受真氣八百一十丈積之一月計二萬四千三十丈其氣蒸育胚胎精血始凝溟涬混沌受氣二月孕秀胎結男女始分其形受氣三月三焦品位脾胃已成受氣四月尻骨始露筋絡羅布受氣五月五臟生成孔竅開闢受氣六月六腑配合十二經成受氣七月三焦氣闢五臟六腑七孔八骸九竅骨筋肉脈孫絡精血皮膚毛髮爪甲具焉受氣八月榮衛通流隨母呼吸受氣九月神全氣足魂魄安舍十月受足真氣男女受胎共二十四萬三千丈氣變神靈天命入體胎結解根即遂誕生又曰一月精血凝二月形似盆三月成三魂四月成七魄五月分五臟六月定六腑七月開七竅八月神識具九月宮室布十月氣滿足又曰一月如草頭露二月如桃花三月男女分四月形象備五月骨骼成六月毛髮生七月動右手八月動左手九月穀氣入胃十月神具足而降生夫脾胃者陰陽之男女左右者陰陽之道路呼吸者陰陽之出入脈息者陰陽之權衡至數者陰陽之度數也五臟主五竅肝主眼心主舌脾主口肺主鼻腎主耳五臟所藏肝藏魂心藏神脾藏意肺藏魄腎藏志五臟聲色臭味液一臟有五五五二十五乃五行錯綜之道也肝呼青臊酸淚通於眼目也心笑赤焦苦汗泄於皮腠也脾歌黃臭甘涎溢於口唇也肺哭白腥臭辛涕潤於鼻竅也腎呻黑腐咸唾生於牙齒也三焦定位上焦在膻中中焦在中脘下焦在膀胱上口三焦所統三焦者百骸之樞紐九竅之通衢五臟之關會六腑之要津五臟所惡心惡熱熱則脈潰濁肺惡寒寒則氣留滯肝惡風風則筋燥急脾惡濕濕則肉痿腫腎惡燥燥則精竭涸是謂五惡五臟五禁又謂五裁肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘以上口嗜而欲食之不可多也必自裁之命曰五裁五臟受病禁食肝病無多食酸食酸則肉胝䐢而唇揭心病無多食苦食苦則皮槁而毛拔脾病無多食甘食甘則骨病而發落肺病無多食無食辛則筋急而爪枯腎病無多食鹹食鹹則脈凝泣而變也五臟生成諸脈者皆屬於目脈者血之府諸髓者皆屬於腦腦者髓之海諸筋者皆屬於節筋氣堅結皆絡於骨節之間也諸血者皆屬於心血居脈內故屬於心也諸氣者皆屬於肺肺藏三氣故也五臟所勞盡神度量勞於肝肝勞傷血血少筋干曲運神機勞於心心勞脈損脈損神怯意外致思勞於脾脾勞意損意損肉脫預事而憂勞於肺肺勞氣耗氣耗生喘矜持志節勞於腎腎勞髓稀髓稀骨痿五臟五虛肝虛氣入而為目昏心虛氣入而為蕩肺虛氣入而為喘腎虛氣入而為腰痛脾虛穀氣不入則為肉削五氣所病胃為氣逆為嘁為恐大腸小腸為泄下焦溢為水膀胱不利為癃小便濁也不約為遺溺膽為怒是謂五病五邪所亂邪入於陽則狂邪入於陰則痹搏陽為巔疾巔為首疾搏陰則為瘖陽入之陰則靜陰出之陽則怒以上是謂五亂怒為恐五勞所傷久視傷血勞於心也心主血故如是久臥傷氣勞於肺也肺主氣故如是久坐傷肉勞於脾也脾主肉故如是久立傷骨勞於腎也腎主骨故如是久行傷筋勞於肝也肝主筋故如是以上是謂五勞所傷五勞之疾一則有患喜怒大便苦難口內生瘡此為心勞疾二則有患短氣面腫鼻不聞香咳嗽脅滿此為肺勞疾三則有患面目乾黑口苦神亂視物不明此為肝勞疾四則有患舌卷強直不得嘔酸氣脹唇焦此為脾勞疾五則有患小便黃赤兼有餘瀝腰痛耳鳴此為腎勞疾五邪所幹有中風有傷暑有飲食勞倦有傷寒有中暑此之謂五邪五邪為病有虛邪有實邪有賊邪有微邪有正邪所謂我生者為實邪生我者為虛邪我克者為微邪克我者為賊邪自病者為正邪五臟運化腎受其精志強骨輕腎復傳肝肝受其精目明筋柔肝受於心神爽志遠心復受脾智遠舒揚脾傳於肺氣和顏悅五氣所病心為噫逆氣也胃氣所主肺為咳肝為語脾為吞腎為缺為嚏嚏鼻氣也五精所並精為火之精並於心則喜並於肺則悲並於肝則憂並於脾則哀並於腎則恐五虛五實五實為陽陽毒者為邪氣有餘脈盛者心也皮熱者肺也腹脹者脾也前後不通者腎也贅悶者肝也五實從火數故也五虛為陰陰毒者為正氣不足脈細者心也皮寒者肺也氣少者肝也泄痢前後者腎也飲食不入者脾也五虛從水數六灸陰交穴穴在臍下一寸是也五形志治法形樂志苦病生於脈治之以針刺形樂志樂病生於內治之以針石形苦志樂病生於筋治之以尉引形苦志苦病生於咽嗌治之以百藥形數驚恐經絡不通病生於不仁治之以按摩醪藥以上是謂五形志也五敗之疾面腫蒼黑謂之肝敗手掌腫無紋謂之心敗唇反黑色無紋理謂之肺敗陰腫莖不起謂之腎敗臍腫鼓脹滿謂之脾敗七傷之病一陰汗二精寒三精清四精少五囊下濕六小便縮七夜夢陰人八邪之病風者虛也委於皮毛肺邪也寒者實也腎邪也暑者熱也積於血脈心邪也濕者水也通潤津液亦腎邪也飢者餒也谷不實胃胃邪也飽者逸也谷實於脾脾邪也勞者疲也苦於委汗筋邪也逸者樂也筋緩肉疏不能動轉魂邪也九損之病一手足青二手足虛腫三爪枯齒禁四語聲散鼻虛張五唇寒冷露六唇腫齒焦枯七手循衣縫八汗出而不流九舌卷卵縮六壞之病當汗不汗令人九竅閉塞熱悶狂亂而死也不當汗而強汗令人鼻衄吐血肺裂聲啞而死也當下不下令人腹壅脹滿遍身浮腫發黃而死也不當下而強下之令人腹痛肚冷腸泄瀉不止而死也當灸不灸令人陰氣衝心胃中寒寒而死也不當灸而強灸之令人火邪入內熱亂淋血發狂而死也五臟六腑寒熱相移論腎移寒於脾臃腫少氣脾移寒於肝臃腫筋攣肝移寒於心狂隔中滿心移寒於肺肺消消者飲一泄二死不治肺移寒於腎為湧水者按腸不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為隔消為咳甚者為泄為痛六化之病厥陰風化戰動少陰熱化腫毒陰明燥化乾渴太陽寒化浮虛太陰濕化濡泄少陽火化狂燥五積名狀肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已心之積名曰伏梁起臍上大如臂上至心下久不愈令人病煩心脾之積名曰痞氣在胃脘覆大如盤久不愈令人四肢不收發黃疸肺之積名曰息賁在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺癰腎之積名曰奔豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣五泄皆有所受胃泄者飲食不化色黃即飧泄也脾泄者腹脹滿泄注食即嘔吐逆即濡泄也大腸泄者食已窘迫大便色白腸鳴切痛即洞泄也小腸泄者溲而便膿血少腹痛即血泄也大瘕泄者結也裡急後重數至圊而不能便莖中痛此五泄之要法也即腸澼也下痢赤白者灸小腸俞是也穴在十六椎下兩傍各一寸五分纍驗五腑各受五臟之色小腸為赤腸以心為合也大腸為白腸以肺為合也膽者為青腸以肝為合也胃者為黃腸以脾為合也膀胱者為黑腸以腎為合也六腑各有傳瀉配合之道經曰小腸者受盛之府大腸者傳瀉行道之府膽者清淨之府胃者水穀之府膀胱者津液之府小腸者心之府大腸者肺之府膽者肝之府胃者脾之府膀胱者腎之府五臟五和肝和則能生氣心和則能役氣脾和則能養氣腎和則能泄氣肺和則能藏氣臟有五腑獨有六者何也謂三焦也有原氣之別焉主持諸氣有名無形其經屬手少陽此外腑也故言腑有六焉腑有五臟有六者何也謂腎有兩臟也其左為腎右為命門命門者精神之所舍也男子以藏精女子以系胞其氣與腎氣通故言臟有六也七衝門何在唇為飛門齒為戶門會厭為吸門會厭謂咽喉會合門胃為賁門太倉下口為幽門大腸小腸會為闌門下極肛門也為魄門故曰七衝門也七傳者傳其所勝也間傳者傳其子也假令心病傳肺肺病傳肝肝病傳脾脾病傳腎腎病傳心一藏不再傳故言七傳者死也假令心病傳脾脾病傳肺肺病傳腎腎病傳肝肝病傳心是子母相傳竟而復始如環無端故曰生也五苦六辛五苦者五臟為里屬陰宜用苦劑謂之酸苦湧泄為陰六辛者六腑為表屬陽宜用辛劑謂之辛甘發散為陽神藏五形藏四合為九藏九候也神藏者肝藏魂心藏神脾藏意肺藏魄腎藏志也以其皆神氣居之故云神藏五也所謂形藏者皆如器外張虛而不屈含藏於物故云形藏也所謂形藏者四一頭角二耳目三口齒四胸中是也五穀五果五畜五菜所養五穀為養謂粳米小豆麥大豆黃黍也五果為肋謂桃李杏栗棗也五畜為益謂牛羊豕犬雞也五菜為充謂葵藿薤蔥韭也以上氣味合而服之以補精益血此五者有辛酸甘苦咸各有所利或散或收或緩或急或堅或軟四時五臟病隨五味所宜也過食之反生其病矣詳見下文又曰陰之所生本在五味陰之五宮傷在五味是也味過於酸肝氣以津則多津液使小便不利味過於咸大骨氣勞短肌心氣抑咸走血也大骨氣勞咸傷腎也味過於甘心氣喘滿色黑腎氣不行甘性滯緩食之令人氣喘腎臟不平土抑水也味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央沮注也弛緩也央殃也一便邪熱分氣血二經治療渴而小便不得邪熱在氣分矣不渴而小便閉邪熱在血分矣八風八方之風也變則為癰腫筋攣骨痛者傷東風北風之變也風從東方來名曰癭兒風其傷人也外在筋紐風從東南來名曰弱風其傷人也外在於肌風從西南來名曰謀風其傷人也外在於肉風從北來者名曰大剛風其傷人也外在於骨由此四方之變而病乃生十二經為十二官心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳道之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉又曰氣化則能出矣凡此十二官不得相失也十二經藏象心者血之本神之變也肺者氣之本魄之處也腎者蟄封藏之本精之處也肝者罷音皮極之本魂之居也脾胃大腸小腸三焦膀胱者倉廩之本營之居也五味所禁辛走音搸氣氣病無多食辛苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸咸走血血病無多食鹹是謂五禁無令多食五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五味所宜肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦小麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛是故辛散酸收甘緩苦堅咸軟
