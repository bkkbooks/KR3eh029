body:
  text: 卷之二四時之氣人或感之有此之傷春傷於風邪氣留連至夏乃為洞泄夏傷於暑至秋髮為痎瘧秋傷於濕至冬上逆而咳發痿厥冬傷於寒至春必溫病以上四時之氣更傷五臟聲言衣食水聲如從室中言者是中氣之濕也言如微終日乃復言者此奪氣也衣被不欲言語善惡不避親疏者此神明之亂也食廩不藏者是門戶不要也要者謂不禁要水泉不止者是膀胱不藏也水泉謂前陰流注也人身之表裡病見頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩垂府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死人之夢寐陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷故人臥血歸於肝心主血肝藏血動則血行於周身靜則血歸於肝故肝藏血也又曰肝得血而能視足得血而能步掌得血而能握指得血而能攝又曰開鬼門謂發其汗也潔淨府謂利水道也去宛陳莝謂去積久之物也又曰清陽實四肢濁陰歸六腑四肢外動故清陽實之六腑內化故濁陰歸之又曰水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味氣化精生味和形長又曰陰勝則陽病陽勝則陰病陽勝則熱陰勝則寒則一意也又曰重寒則熱重熱則寒寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄又曰清氣在下則生飧泄濁氣在上則生䐜脹清氣者熱氣也在下則穀不化故飧泄濁氣者寒氣也在上則氣不散故脹滿也又曰清氣出上竅濁陰出下竅陽本乎天者親上陰本乎地者親下各從其類也上竅謂耳目口鼻下竅謂前陰後陰又曰清陽發腠理濁陰走五臟腠理謂滲泄之門故清陽可以發散濁陰為五臟包藏之所故濁陰可以走之又曰結陽腫四肢結陰者便血陰陽結邪多陰少陽曰石水少腹腫二陽結為之消二陽結謂胃與大腸俱熱結也熱則喜消水穀也又曰三陽結謂之隔三陽結謂小腸膀胱熱結也故隔塞而不便瀉又曰三陰結謂之水三陰結謂脾肺寒結也故則氣化為水又曰一陰一陽結謂之喉閉一陰謂心脈一陽謂三焦脈二經之脈並絡喉熱氣內結則患喉痹又曰陰搏陽別謂之有子陰謂尺中也陽謂寸口也搏謂結於手也尺脈與寸口殊別則為有子何者謂陰中有別陽故也又曰陰陽虛腸闢死闢陰也謂胃氣不留故腸間弗禁倉庫不廉則真氣竭絶故死闢作澼又曰陰虛陽搏謂之崩陰脈不足陽脈有餘故崩血下心又曰色者神之旗臟者神之舍故神去則臟敗臟敗則色見異常之死候也又曰飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾又曰邪氣盛則實精氣奪則虛氣虛者肺虛也氣逆者足寒也重實者脈與氣俱實也重虛者脈虛氣虛尺虛是也又曰陽者天氣也主外地者陰氣也主內故陽道實陰道虛若犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則填滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣故傷於風者上先受之傷於濕氣者下先受之又曰熱傷氣寒傷血清陽上天濁陰歸地陽化氣陰成形寒極生熱熱極生寒寒氣生濁熱氣生清陽生陰長陽殺陰藏故清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣三才以肖人頭以配天足以象地五藏中傍人事故天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴氣象雷逆氣象陽二陽之病發心脾有不得隱曲故女子不月二陽謂手陽明大腸足陽明之經脈也隱曲謂隱蔽委曲之事也夫腸胃發病心脾受之心受之則血不流脾受之則味不化血不流故女子不月味不化則男子少精是以隱曲之事不能為也又曰精不足者補之以味由是觀之則味不化而精氣少也又曰胞胎者繫於腎又曰月事不來者胞脈閉也胞脈者屬於心而絡於胞中令氣上迫肺心氣不得下通故月事不來此其意也治病次第識其高下治法邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害人六腑地之濕氣感則害人皮肉筋脈因其輕而揚之因其重而減之因其衰而彰之彰者彰明氣色也形不足者溫之以氣精不足者補之以味其高者因而越之謂越揚上吐也其下者引而竭之謂泄下引也中滿者瀉之於內內謂腹內邪其有邪者漬形以為汗邪謂風邪在表發之以汗血實者決之以砭針去血氣虛者宜掣引之導引其氣治病舉綱論且如病之一二言之隔塞悶絶有氣窒之病原其本得之於暴憂不治其氣而釋其憂也且如女子不月血滯之病也原其本得之於心氣不下通也不治其血而通其心可也且如勞極驚悸者過傷也勞於心氣不足使心氣內和則精神莫得而動也且如頸痿者風毒之病也每傷於憂愁思慮之不止使志意和通則氣血自得而通暢則凡治病之術不先制其所欲正其所念去其所惡損其所恐未有不能愈者也夫病有中外治有緩急論凡在內者以內治法和之凡在外者以外治法和之氣微不調以氣法調之其次大者以平氣法平之盛甚不已則奪其氣令其衰也故經曰調氣之方必在陰陽定其中外各守其鄉內者內治外者外治微者調之其次平之盛者奪之汗者下之寒熱溫涼衰之以屬隨其攸利也五臟四時受病發咳經曰乘秋則肺先受邪乘春則肝先受邪乘夏則心先受邪乘至陰則脾先受邪乘冬則腎先受邪又曰何以異之答曰肺咳之狀而喘息有音甚則唾血心咳之狀則心痛喉中介介如梗狀甚則咽痛喉閉肝咳之狀則兩脅下痛甚則不可以轉轉則兩脅病脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎六腑受病發咳又曰六腑之咳安所受病答曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺失心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺尿三焦受病發咳又曰久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此聚於胃關於肺使人多涕唾而面浮腫氣逆也經曰人之五臟卒痛何氣使然答曰經脈流行不止環周不休寒氣入經而稽遲泣音澀而不行客於脈外則血少客於脈中則氣不通故卒然而痛又曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與小腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人有少間復生者或痛而嘔者或腹痛或後泄者或痛而閉不通者凡此諸痛各不同形別之奈何答曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈細急則外引小絡故卒然而痛得炅則痛立止炅熱也下同因重中於寒則痛久矣寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留炅氣從上則脈充大而血氣亂故痛甚而不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之動止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣則脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血泣脈泣則血氣虛血氣虛則痛其俞泣於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈者絡陰氣繫於肝寒氣客於脈中則血泣脈急故脅肋與小腹相引痛矣厥氣客於陰股寒氣上及小腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄復矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不出故痛而閉不通矣又曰所謂言而可知者也視而可見答曰五臟六腑固盡有部也視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也又曰捫而可得奈何答曰視其主病之脈堅而血及陷下者皆可捫而得也故知百病生於氣也故有九氣九氣所生之病怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收寒則腠理閉而氣不行故氣收寒則氣散非也炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生答曰怒則氣逆甚則嘔血故氣上矣喜則氣和志達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣炅則腠理開榮衛通汗大泄故氣泄矣驚則氣無所倚神無所歸慮無所定故氣亂矣勞則喘息汗出內外皆越故氣耗矣思則心有所存神有所拘正氣留而不行故氣結矣又曰有病心腹脹滿旦食則不能暮食此為何病答曰名為鼓脹此食飲不節故當病氣聚於腹也又曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之答曰病名血枯得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也又曰病有少腹盛上下左右皆有根此為何病可治不答曰病名伏梁又曰伏梁何因而得之答曰裹大膿血居腸胃之外不可治治之每切按之至死又曰何以然答曰此下則因陰必下膿血上則迫胃脘生膈俠胃脘內癰此久病也難治居臍上為逆居臍下為從勿動亟奪亟數也奪去也言不可移動但數數去之則可矣又曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸頸項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫痛酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱夫如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止時節而動是無火也當助其心又如大熱而甚寒之不寒是無水也熱動復止倏忽往來時動時止是無水也當助其腎內格嘔逆食不得入是有火也病嘔而吐食久反出是無火也暴迫注下食不及化是無水也溏泄而久止發無常是無水也故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不得寒是無火也寒不得熱是無水也夫寒之不寒責其無水熱之不熱責其無火熱之不久責心之虛寒之不久責腎之虛有者瀉之無者補之虛者補之盛者瀉之居其中間疏無壅之令上下無礙氣血通調則熱自和陰陽調達矣是以經有治熱以寒寒之而水食不入治寒以熱熱之而昏躁已生此則氣不求通壅而為是也紀於水火餘氣可知故曰有者求之無者求之盛者責之虛者責之令氣通調妙之道也經曰病甚則棄衣而走登高而歌或至不食數日踰垣上屋所上之處皆非其素乃能也病反能者何也答曰四肢者諸陽之本也陽盛則四肢實實則能登高也又曰棄衣而走者何也答曰熱盛於身故棄衣而走也又曰其妄言罵詈不避親疏而歌何也答曰陽盛則惡人罵詈不避親疏而不欲食故妄走也經曰足陽明之脈病惡人與聞木音則惕然而驚鐘鼓不為動聞木音而驚何也答曰陽明者胃脈也胃者土也故聞木音而驚土惡木也其惡火何也答曰陽明主肉其脈血氣盛邪客之則熱熱甚則惡火其惡人何也答曰陽明厥則喘而惋惋內鬱熱也則惡人又或喘而死者或喘而生者何也答曰厥逆連藏則死連經則生
