front:
  text: 序原夫醫道之來尚矣自神農嘗百草而始有醫藥繼至軒岐問答而成素問靈樞之書俾運氣之推遷臟腑之虛實標本之病能垂訓萬世真有以措斯民於無扎瘥橫夭之患矣迨及伊尹述湯液本草而神農之功著秦越人注難經而素問之理明然越人去古未遠意旨周密人未易曉至於漢晉唐若張長沙制傷寒活人書王叔和注脈決孫思邈著千金諸方而斯理始昭然矣沿至遼宋劉守真張潔古李東垣張子和輩迭出無非所以闡明夫前賢往聖之妙旨為言而斯理又大彰矣則醫之為書可謂備矣活人之方可謂盡矣其濟人利物之功豈小補云惜乎後之學醫者見其卷帙繁拏理趣淵微議論玄遠雖常觀讀猶未得旨至使或有求意而不得者亦有棄而不用者苟以醫鳴於世不過執以方書對證發藥爾豈知年之運氣時之勝復及標本虛實之由臟腑邪正之能哉噫真可謂棄本而逐末盲己而誣人者矣夫人之生死繫於醫醫之本原出於經苟舍經而他求其害豈可勝言余幼習儒書長究醫業浪跡江湖間三四十年探考樞素繹絡群方未嘗敢怠遇有名醫輒往請益得其方書之善者則拜受鈔錄惟恐有失迨茲暮年尚有欠焉此蓋由余之資鈍質愚故耳幸遇聖朝恩彌六合濡及蒿萊叨授良醫正領職以來戰戰兢兢欲圖補報將何能哉荷蒙賢王體天地生物之心為心法皇上好生之德為德嘗諭護衛遴選聰明俊逸子弟委臣禮等教授軒岐諸家之書愚切有懼焉何患弟子初學非惟一時不能以造其微而尤恐有類向之盲己誣人之患者是以忘其固陋每遇公暇輒於難經素問與夫歷代名醫書中搜索玄微撮其切要間亦竊附己意撰成歌括次第成帙以授諸生使其讀取數句以上則一臟腑之理渙然矣斯其易學而易精將見得之於心應之於手使方寸無疑伸人生有賴是亦小補云爾書成目之曰醫學碎金諸生倘以予言不耄玩讀詳味久自得之使杆格之病無而微妙之理得則一旦豁然貫通矣豈不由碎金之投爐煅煉溶化欲成其器一火而就乎雖然斯理也烏可自謂之至哉但俟同志恕予白首狂簡改而正之斯其美矣於是乎書永樂十三年歲次乙未春二月上浣日迪功郎良醫所良醫正梅屋老人周禮自序
