body:
  text: 卷之四診脈法凡與人診候順於平旦寅時陰氣未動陽氣未散飲食未進經脈未盛絡脈勻和氣血未行令患人端坐齊整方可看候脈者榮衛也榮者血也衛者氣也血者標也氣者本也人一呼一吸為一息叔和云一息四至號平和更加一至太無疴是平人之脈也三遲二敗是為不及六數七極是為太過凡診五臟六腑太過不及皆見於寸口吉凶之法也左手寸口為人迎右手寸口為氣口醫中最巧以脈為先雖未通於九道十邪且要知七表八里診脈下指輕重法一下指如三豆之重與皮毛相得者即是肺脈也二下指如六豆之重與血脈相得者即是心脈也三下指如九豆之重與肌肉相得者即是脾部脈也四下指如十二豆之重與筋平者即是肝部脈也五下指如十五豆之重與骨切重按之者即是腎脈也脈體標本或問人身脈息何物為體脈者人身之氣血血者水也遁相灌溉循環不息故名榮衛以為脈也榮主血也血者心家之所出衛主氣也氣者府藏之所生榮衛二事合為脈體又名標本標者血也心也本者氣也衛也榮行脈中衛行脈外一日一夜一萬三千五百息脈行五十度周於身故為脈也人一呼脈行三寸一吸脈行三寸一呼一吸為一息四至號平和五至為無病也左寸心小腸屬君火心主血小腸為受盛之府關肝膽屬木肝藏血膽為清淨之府尺腎與膀胱屬水腎與膀胱為津液之府右寸肺大腸屬金肺主氣大腸為傳瀉行道之府關脾胃屬土脾主化胃者水穀之海尺命門三焦屬相火以上男女皆一定之法更無改易金木水土各一位惟火何獨有二也蓋有君火相火放火有二焉又曰男子生於寅寅木也木陽也故男子脈盛在關上關上陽也女子生於申申金也金陰也故女子脈盛在關下關下陰也又曰男子從子左行三十至已女子從右行二十至已故男子三十而娶女子二十而嫁故法取於此也又曰三部者寸關尺也九候者浮中沉也一部凡有三候三三為九候也人身亦有三部上部法天主膈以上至頭之有疾也中部法人主膈至臍之有疾也下部法地主臍以下至足之有疾也三候色脈形色以候天脈以候地形者乃候地之陰陽也診法經云三候者浮中沉也今三候左寸俱數必主心經熱也餘部仿此浮沉遲數四脈浮者陽也指下尋之不足舉之有餘再再尋之狀如太過曰浮又主裡寒表熱歌曰寸浮中風頭熱痛又曰浮而有力為風浮而無力為虛沉者陰也指下尋之似有舉之全無緩度三關狀如爛綿曰沉主氣脹兩脅手足時冷歌曰寸脈沉兮胸有痰又曰沉而有力為積沉而無力為氣脹遲者陰也寒也諸陰為寒指下尋之重手乃得隱隱曰遲又曰寸口脈遲心上寒數者陽也熱也諸陽為熱指下尋之三關通度按之有餘舉之甚數狀若洪弦法曰數主風氣伏陽上衝化為狂病又曰緊脈關前頭裡痛口寸脈緊主心下滿痛又曰關前為陽關後為陰又曰人迎緊盛傷於風左手關前為人迎氣口緊盛傷於食右手關前為氣口又曰男得女脈為不足病在四肢女得男脈為太過病在內又曰男子尺脈常不足女子尺脈常有餘診七表脈法歌曰浮而指下拈蔥葉芤即中空有兩傍滑體往來常不定弦如指下彈長竿緊似琴絃張指下實認輕輕愊愊然洪舉按之皆盡滿此名七表腑陽傳七診脈七者三部九候之相失形氣相得者生三五不調者疾三部九候皆相失者死獨大三部脈出多入少與太過相似病主皮膚壯熱喘息上奔五臟之氣壅而並出不可治獨小三部俱沉細病主四肢微寒中膈氣閉腹沖兩脅氣攻刺痛不可治獨寒三部皆沉沉如爛綿按不知所在病主伏陽在內四肢皆冷陰包陽也不可治獨熱脈皆洪數惟寸微壅病主臟腑有熱四肢亦然與疾相似但獨疾者驟然也可治獨遲按之三部俱遲病主氣在膚致有不安獨疾寸關急數尺微虛者為痰病主口乾心躁鼻塞頭痛感熱之深者不可治獨陷脈隱在肌骨者病主四肢不舉疼痛在骨陰陽表裡一同可治診八里脈法一息四至號為遲緩脈輕沉來往遲微似細風吹鳳翼澀若輕刀刮竹皮輕舉即無按卻有伏肉無之骨有之舉按皆虛名曰濡弱似浮漚近手時八里屬陰為臟脈叔和分別要均知知七表為病法浮為中風芤失血滑為吐逆實痢別弦為拘急緊為痛洪為熱兮腑易治知八里為病法微為氣痞沉冷氣緩則氣結澀血滯遲為寒兮伏物聚濡為氣虛弱筋痿九道脈及論證陽長舉之有過於本位曰長病主陽毒在內三焦積熱坐臥不寧渾身潮熱足脛疼痛可汗陰短按之不及本位曰短病主陰中伏陽三焦氣壅四體思寒宿食不消可下陰虛按之甚大無力而遲病主少力恍惚驚悸目昏耳聾身體煩熱小兒驚風左為血虛右為氣虛陽促按之極數而時止併居寸口退則生加則死病主積聚氣結於內氣血留滯結促非惡脈也陰結按之聚之卻還或來或去大小不足病主臟腑積聚氣結於內腸胃疼痛四肢迷悶結伏臟積結浮腑積陰代按之不動而不來須臾復動如有所代而不能自還病主氣衰亂為必死之脈女子得之為孕老者生少者死四季得之無害亦主霍亂陰牢尋之即無按之即有曰牢病主胸中滿促骨肉疼痛皮膚紅腫亦為死脈陰動無頭無尾厥厥動搖大如豆病主勞倦遍身疼痛男血痢女血崩為陰陽相搏陽不勝陰則氣乏陰不勝陽則血盡陰細脈在皮肉按之如細細線病主形容瘦瘁毛髮枯槁脛痠髓冷泄精少力秋得之無害知九道為病歌長為壯熱短惡寒虛是多驚促氣煎結為積聚代魂散牢為骨痛動虛勞細為體虛九道病陰陽錯亂命難逃知十邪為病法雀啄來疾遲屋漏胃絕無生死卻有切繩解索時散結脾死神仙也難救魚翔釜沸名伏屍榮衛斷絕魂魂飛土丸細小彈石大此證送屍誠可怕蝦游鬼疰曰傳屍偃刀脈至最為怪凡寸口見雀啄者死關尺見之猶不妨蝦游解索重病難痊凡寸口見屋漏不妨關尺見之重病必死診四季脈法春怕秋脈夏怕冬季中春脈忌相逢秋逢夏脈冬逢季此候須知總是空論候認病法弦緊遲微滿急寒浮洪緊數熱相兼濡弱伏沉多氣劣實芤數澀血風煎蝦游解索應難差屋漏雀啄實難痊四時但知除此外其餘總是病根源論脈體相似弦緊渾相似微濡弱一般緩遲形不異芤陷體同看浮洪皆一色沉伏細詳觀若非深造者分別料應難又曰長與弦相似短與澀相似虛與濡相似洪與緊相似結與促相似代與伏相似牢與沉相似動與浮相似細與微相似又曰浮與洪相似滑與短相似實與牢相似數與促相似濡與弱相似緩與遲相似澀與緊相似伏與動相似沉與虛相似五臟脈逆順心脈洪大而散反見沉濡而滑者不可治也腎脈沉濡而滑反見遲而緩者亦不可治也脾脈遲緩而大反見弦而長者亦是逆脈也肝脈弦軟而長反見微沉短澀者乃為不順也肺脈浮短而澀反見洪大而散者亦為不可治也五臟正經自病憂悉思慮則傷於心其證血脈虛少不能榮養五臟六腑宜調其營衛形寒飲冷則傷於肺其證皮聚而毛落者死可以益其氣者也沖怒氣逆上而不下則傷於肝其證筋緩不能自收持宜緩其中也飲食勞倦則傷於脾其證肌肉消瘦宜調其飲食適其寒溫也久坐濕地強力入水則傷於腎其證骨痿不能起於床者死宜益其精脈有六會太衝脈在足大指下節後二寸半陷中是太谿脈在足內踝後跟骨上動脈陷中是神門脈在手掌後兌骨之端陷中是衝陽脈在足跗上去二寸陷中是尺澤脈在肘中約約動脈是天府脈去腋肘下身三寸陷中是汗下合宜陽盛陰虛汗之則愈下之則死關前為陽寸盛而尺微也陰盛陽虛下之則愈汗之則死關後為陰寸微而尺盛也通真子宜溫汗下歌弦遲之脈宜溫藥緊數之時汗最宜脈若來弦並小緊此為可下不須疑五邪所見脈春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈名曰陰出之陽病善怒不治是謂五邪皆同死命不治五脈應象肝脈弦心脈鉤脾脈代肺脈毛腎脈石是謂五臟之脈經曰陽盛則促陰盛則結又曰十二經者五臟六腑也十五絡者七表八里十五脈也一經則一絡餘三絡者陰絡即女子之命脈陽絡者即男子之命脈脾之大絡者即十二經之胃氣也又曰夫脈者血之府也長則氣治短則氣痛數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛又曰形盛脈細少氣不足以息者危形氣相反故生氣至危形氣相得謂之可治今脈氣不足形氣有餘證不相扶故當危也危者言其近死猶有生者又曰形瘦脈大胸中多氣者死形氣不足脈氣有餘故死又曰胃脈實則脹虛則泄脈實者氣有餘故脹滿脈虛者氣不足故泄利脈病相應謂之從脈病相返謂之逆尺脈澀滑謂之多汗血涸而陽氣尚多故汗尺寒脈細陰微即下言尺氣虛少目裹微腫如臥蠶之狀曰水水者陰也目下亦陰也腹者至陰之居也故水在腹中者必使目下腫也當用大橘皮湯等藥治之七方大小緩急奇偶復大方之說有二病有兼證而邪不傳醫不可以一二味治者宜君一臣三佐九之大方病有在身半以下而遠者分兩大而數少取其氣味專一而不分散也小方之說有二病有在心肺以上而近者宜分兩微而少服徐徐呷之是也病有無兼證邪氣專一可一二味而治者宜君一臣二之小方緩方之說有五病有在胸膈者宜甘以緩之取其甘能戀膈也有凡以緩之之緩畫比湯散其氣力難化而宣行遲也有品件群眾之緩方蓋藥味眾則各不得騁其性如萬病丸七八十味遁相拘制有無毒治病之緩方蓋性無毒則功自緩矣有氣味薄之緩方蓋氣味薄則主於補上蓋補上治上制之以緩緩則氣味薄也急方之說有五心腹暴痛兩陰溲便閉塞不通病不容候用備急丹是也又如中風牙關緊急漿水粥不入用急風散之屬有湯散蕩滌之急方蓋湯散比丸劑取其下咽易散而施用速也有藥性有毒之急方蓋有毒則能上湧下泄可以奪病於下而氣力不衰也奇方之說有二有獨用一物之奇方即單方是也有數合陰陽數之奇方一三五七九以藥味數皆奇也如君一臣三亦奇數也故方宜下不宜汗偶方之說有三有兩味相配之偶方有兩味相合之偶方有數合陰陽之偶方謂二四六八十也如君二臣四君臣六皆偶數也故偶方宜汗不宜下複方之說有二有二方三方相合之複方如桂枝越婢一湯如謂調胃承氣湯加連翹黃芩梔子名涼膈散又有分兩勻劑之複方如胃風湯各等分均平也十劑宣通補瀉輕重滑澀燥濕也宣劑宣者舉世皆以宣為瀉劑然十劑之中已有瀉劑何以又重是蓋宣者升而上也以君召臣曰宣義或同此內經曰高者因而越之木鬱則達之豈非宣劑即所謂湧劑者乎蓋十劑之中獨不見湧劑則宣為湧明矣通劑通者流通之謂也前後不得溲便裡急後重數至圊而不便凡麻癉蔚滯經遂不開非通劑莫愈也補劑補者五臟各有補瀉肝實瀉心肺虛補腎經曰東方實西方虛瀉南方補北方大率虛有六表虛裡虛上虛下虛陰虛陽虛設陽虛補以附子陰虛補以大黃芒硝今人往往以熱為補以寒為瀉訛非一日豈知酸苦辛甘鹹各補其臟內經曰精不足者補之以味善補者病去而進之以穀肉食者真得補法也瀉劑經曰實則瀉之實者乃邪氣之作實也諸痛為實痛隨利減又曰中滿者瀉之於內大黃牽牛甘遂芒硝巴豆之屬皆瀉劑也惟巴豆其性燥熱不可不慎恐留毒致生他證縱不得已而用之必順致其毒今人往往以巴豆熱而不畏以大黃寒而反畏庸不知所謂瀉者哉輕劑風寒之邪始自表入頭痛身熱腰脊強內經曰宜輕劑以揚之本草曰輕可去實宜麻黃葛根升麻之屬也重劑久病咳嗽涎潮於上咽喉不利形羸不可峻攻其藥則以硃砂水銀沉香水石黃丹之屬以其體重能鎮縋內經曰重者減之貴其漸也滑劑周禮曰滑以養竅大便燥結小便淋澀皆宜滑劑燥結者麻仁郁李仁之類淋澀者葵子滑石之類其有前後不通兩陰俱閉名曰三焦約宜先以滑劑表養其燥然後攻之則無失矣澀劑寢汗不已澀以麻黃根防己牡蠣滑泄不已澀以豆蔻白礬木賊烏魚粟殼凡酸味亦同乎澀喘嗽不已韭汁烏梅寧肺膏皆酸而澀也然此數種當論其本以去其邪不可專以澀為萬全也燥劑積寒久冷食已不飢吐利腥穢屈伸不便上下所出水液澄澈清冷此為大寒之故宜乾薑良薑附子胡椒輩以燥之然非積寒之病不可用用不對證變為血泄血溢大枯大涸溲便癃閉聾瞽跋弱若曰病濕者則以白朮陳皮木香防己蒼朮皆能除濕亦燥之平劑若黃連黃柏梔子大黃之苦皆能燥濕此內經之本旨也與世相違久矣嗚呼豈獨姜附之專方為燥劑乎濕劑濕與滑相類其間少有不同內經曰辛以潤之蓋辛能走氣能化液者也芒硝性雖咸本屬真陰之水誠濡枯之上藥也人有枯渴皴揭之病非獨金化為然蓋有火以乘之非濕劑莫能愈也
